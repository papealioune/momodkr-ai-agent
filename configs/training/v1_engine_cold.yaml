run_name: v1-engine-cold
seed: [42, 43, 44]

algo: ppo
policy: MlpPolicy
# Seed-42 baseline peaked at +2.72 around 4M steps and degraded into
# negative territory by 17M (the moleapp §5 late-stage divergence
# pattern). 6M gives ~50% headroom past the typical peak; best_checkpoint
# captures the deployment artifact, the rest is just wasted compute.
# Bump back to 20M only for a long-tail decay study on a passing config.
total_timesteps: 6_000_000
n_steps: 2048
batch_size: 512
n_epochs: 4
gamma: 0.995
gae_lambda: 0.95
clip_range: 0.2
clip_range_vf: null
learning_rate:
  schedule: linear
  start: 0.0003
  end: 0.00005
ent_coef:
  schedule: linear
  start: 0.005
  end: 0.0005
vf_coef: 0.5
max_grad_norm: 0.5

policy_kwargs:
  net_arch:
    pi: [256, 256, 128]
    vf: [256, 256, 128]
  activation_fn: tanh
  ortho_init: true

env_id: MomoDkrEnv-v1
env_config: configs/env/momodkr_v1.yaml
data_config: configs/data/binance_vision_v1.yaml

vec_env:
  type: subproc
  # n_envs sizing -- with env_yaml.max_rows_tail=5M the per-env steady
  # state is ~2GB. 16 envs = ~32GB train + ~2GB eval + ~5GB main = ~39GB
  # on a 58GB pod (19GB headroom). Combined with CUDA_VISIBLE_DEVICES=""
  # this maximises EPYC core utilisation on the 4090 box where the GPU
  # transfer cost dominates compute for our MLP policy anyway.
  n_envs: 16

eval:
  n_eval_episodes: 8
  eval_freq: 50_000
  best_model_save_path: runs/${run_name}/best_checkpoint
  log_path: runs/${run_name}/eval_logs

callbacks:
  sigma_divergence_killswitch:
    high_threshold: 0.85   # normalised entropy > 0.85 = near-uniform random
    low_threshold: 0.05    # < 0.05 = policy collapse onto one action
    consecutive_evals: 2
  trade_log:
    record_obs: true
    record_mp4: false
  best_checkpoint_tracker:
    metric: eval/mean_reward

checkpoint_freq: 250_000
log_dir: runs/${run_name}
wandb_project: momodkr
