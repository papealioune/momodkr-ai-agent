apply_obs_normalisation: true   # z-score market features using train-only norm_stats.json baked alongside each episode
position_feature_clip: 3.0       # hard clip on the 4 position features so leveraged unrealized swings don't blow up the MLP input

env:
  symbols: [BTCUSDT, ETHUSDT, SOLUSDT]
  obs:
    feature_version: "0.1.0"
    flat_vector_dim: 30
    features:
      - ofi_1s
      - ofi_5s
      - ofi_30s
      - micro_price_log_ret
      - log_spread_bps
      - top1_size_imbalance
      - bid_depth_pct_neg_0_1
      - bid_depth_pct_neg_0_2
      - bid_depth_pct_neg_0_5
      - bid_depth_pct_neg_1_0
      - ask_depth_pct_pos_0_1
      - ask_depth_pct_pos_0_2
      - ask_depth_pct_pos_0_5
      - ask_depth_pct_pos_1_0
      - realized_vol_5s
      - realized_vol_30s
      - realized_vol_5min
      - trade_flow_imb_1s
      - trade_flow_imb_5s
      - trade_flow_imb_30s
      - funding_cumulative
      - funding_8h_rate
      - hour_of_day_sin
      - hour_of_day_cos
      - day_of_week_sin
      - day_of_week_cos
      - pos_signed_notional_pct
      - pos_unrealized_pnl_pct
      - pos_hold_ticks_norm
      - pos_peak_unrealized_pct

action:
  type: discrete
  n: 5
  labels: [hold, mkt_buy, mkt_sell, post_bid, post_ask]

leverage: 6
max_position_notional_pct: 0.17   # 6× × 17% ≈ 100% notional (moleapp V9 safe zone)
liquidation_maintenance_margin: 0.03

simulator:
  fee_taker_bps: 3.5          # Hyperliquid live taker tier
  fee_maker_bps: 1.0          # Hyperliquid live maker tier
  fee_noise_pct: 0.05
  walk_book: true             # walk bookDepth %-levels for VWAP fills when available
  slippage_c: 0.001            # sqrt-Kyle fallback when bookDepth missing
  slippage_noise_pct: 0.20
  latency_ticks_min: 1         # 100ms minimum
  latency_ticks_max: 5         # 500ms maximum (covers typical agent->HL p99)
  trade_through_limit_fills: true   # require next_ask <= post_bid (pessimistic FIFO)
  limit_fill_threshold_bps: 1.0     # used only when trade_through is false
  limit_max_age_ticks: 10
  funding_interval_ticks: 288000    # 8h @ 100ms ticks
  liq_maintenance_margin: 0.03
  # Hyperliquid per-symbol tick sizes (USD). Update from venue API as needed.
  tick_size_by_symbol:
    BTCUSDT: 0.5
    ETHUSDT: 0.05
    SOLUSDT: 0.01

episode:
  length_ticks: 9000               # 15 minutes @ 100ms
  reset_on_dd: 0.05
  reset_on_liquidation: true

reward:
  win_multiplier: 4.0
  loss_multiplier: 1.8
  per_entry_cost: 0.02
  dd_quadratic_coeff: 50.0
  dd_threshold: 0.03
  funding_coeff: 0.01
  losing_streak_coeff: 0.05
  losing_streak_offset: 2
  unrealized_breadcrumb_coeff: 0.3
  churn_penalty: 0.005           # per-cancellation flat cost (rate-limit deterrent)
  peak_dd_coeff: 0.5             # peak-to-trough drawdown penalty on open position
  peak_dd_threshold: 0.005       # 50 bps from peak (leveraged) before penalty fires
  reward_floor: -5.0
