env:
  symbols: [BTCUSDT, ETHUSDT, SOLUSDT]
  obs:
    feature_version: "0.1.0"
    flat_vector_dim: 30
    features:
      - ofi_1s
      - ofi_5s
      - ofi_30s
      - micro_price_log_ret
      - log_spread_bps
      - top1_size_imbalance
      - bid_depth_pct_neg_0_1
      - bid_depth_pct_neg_0_2
      - bid_depth_pct_neg_0_5
      - bid_depth_pct_neg_1_0
      - ask_depth_pct_pos_0_1
      - ask_depth_pct_pos_0_2
      - ask_depth_pct_pos_0_5
      - ask_depth_pct_pos_1_0
      - realized_vol_5s
      - realized_vol_30s
      - realized_vol_5min
      - trade_flow_imb_1s
      - trade_flow_imb_5s
      - trade_flow_imb_30s
      - funding_cumulative
      - funding_8h_rate
      - hour_of_day_sin
      - hour_of_day_cos
      - day_of_week_sin
      - day_of_week_cos
      - pos_signed_notional_pct
      - pos_unrealized_pnl_pct
      - pos_hold_ticks_norm
      - pos_peak_unrealized_pct

action:
  type: discrete
  n: 5
  labels: [hold, mkt_buy, mkt_sell, post_bid, post_ask]

leverage: 6
max_position_notional_pct: 0.17   # 6× × 17% ≈ 100% notional (moleapp V9 safe zone)
liquidation_maintenance_margin: 0.03

simulator:
  fee_taker_bps: 3.5
  fee_maker_bps: 1.0
  slippage_model: sqrt_kyle
  slippage_c: 0.001
  latency_bps_uniform: [5, 20]
  fee_noise_pct: 0.05
  slippage_noise_pct: 0.20
  funding_interval_ticks: 288000   # 8h @ 100ms ticks

episode:
  length_ticks: 9000               # 15 minutes @ 100ms
  reset_on_dd: 0.05
  reset_on_liquidation: true

reward:
  win_multiplier: 4.0
  loss_multiplier: 1.8
  per_entry_cost: 0.02
  dd_quadratic_coeff: 50.0
  dd_threshold: 0.03
  funding_coeff: 0.01
  losing_streak_coeff: 0.05
  losing_streak_offset: 2
  unrealized_breadcrumb_coeff: 0.3
  reward_floor: -5.0
